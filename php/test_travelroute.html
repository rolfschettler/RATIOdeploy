<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Test – travelroute</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
      #result-frame {
        width: 100%;
        height: 700px;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body class="bg-light p-4">
    <div class="container">
      <h4 class="mb-3">Test: POST /php/travelroute</h4>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Bearer Token</label>
          <input
            id="token"
            class="form-control font-monospace"
            placeholder="eyJ..."
          />
        </div>
      </div>
      <div class="row g-3 mt-1">
        <div class="col-md-8">
          <label class="form-label">JSON Body</label>
          <textarea id="body" class="form-control font-monospace" rows="8">
{
  "start": "88487 Mietingen",
  "zwischenstopps": ["Baltringen", "Ochsenhausen", "Bad Waldsee"],
  "ziel": "Biberach"
}</textarea
          >
        </div>
      </div>
      <button class="btn btn-primary mt-3" onclick="send()">Absenden</button>
      <span id="status" class="ms-3 text-muted small"></span>

      <iframe id="result-frame" srcdoc=""></iframe>
    </div>

    <script>
      async function send() {
        const token = document.getElementById("token").value.trim();
        const body = document.getElementById("body").value.trim();
        const status = document.getElementById("status");

        status.textContent = "Lädt …";

        try {
          JSON.parse(body);
        } catch (e) {
          status.textContent = "Ungültiges JSON: " + e.message;
          return;
        }

        const headers = { "Content-Type": "application/json" };
        if (token) headers["Authorization"] = "Bearer " + token;

        try {
          const res = await fetch("/php/travelroute", {
            method: "POST",
            headers,
            body,
          });
          const html = await res.text();
          document.getElementById("result-frame").srcdoc = html;
          status.textContent = "HTTP " + res.status;
        } catch (e) {
          status.textContent = "Fehler: " + e.message;
        }
      }
    </script>
  </body>
</html>
